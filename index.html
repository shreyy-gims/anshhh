<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>Anshh | AfterDark Society</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:white;
  font-family:Inter,sans-serif;
  overflow:hidden;
}

/* ===== VIDEO ===== */

video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.35) saturate(1.1);
}

/* ===== DARK OVERLAY ===== */

.bg-overlay{
  position:fixed;
  inset:0;
  background:
  radial-gradient(circle at top,#7c3aed22,transparent 45%),
  radial-gradient(circle at bottom,#2563eb22,transparent 45%),
  rgba(0,0,0,.55);
  z-index:1;
}

/* ===== ENTER SCREEN ===== */

#overlay{
  position:fixed;
  inset:0;
  background:#000;
  z-index:20;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  cursor:pointer;
}

#overlay h1{
  font-family:Orbitron;
  font-size:28px;
  letter-spacing:4px;
  margin-bottom:10px;

  background:linear-gradient(90deg,#fff,#8b5cf6,#3b82f6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

#overlay p{
  opacity:.65;
  font-size:13px;
  letter-spacing:2px;
}

/* ===== MAIN CARD ===== */

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:92%;
  max-width:390px;
  z-index:5;

  padding:18px;

  border-radius:28px;

  backdrop-filter:blur(24px);

  background:rgba(16,16,20,.45);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
  0 0 40px rgba(0,0,0,.55),
  inset 0 0 30px rgba(255,255,255,.03);
}

/* ===== PROFILE ===== */

.card{
  display:flex;
  gap:14px;

  padding:16px;

  border-radius:22px;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.05);

  margin-bottom:14px;
}

.avatar{
  width:68px;
  height:68px;
  border-radius:50%;
  object-fit:cover;

  border:2px solid rgba(139,92,246,.55);

  box-shadow:
  0 0 25px rgba(139,92,246,.4);
}

.title{
  font-family:Orbitron;
  font-size:20px;
  font-weight:700;

  background:linear-gradient(90deg,#ffffff,#c4b5fd,#93c5fd);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  opacity:.75;
  font-size:13px;
  margin-top:4px;
}

.loc{
  opacity:.55;
  font-size:11px;
  margin-top:5px;
  letter-spacing:1px;
}

/* ===== SOCIALS ===== */

.links{
  display:flex;
  gap:10px;
  margin-top:12px;
  flex-wrap:wrap;
}

.links a{
  display:flex;
  align-items:center;
  gap:6px;

  text-decoration:none;
  color:white;

  padding:8px 12px;

  border-radius:14px;

  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.06);

  transition:.3s;

  font-size:12px;
}

.links a:hover{
  transform:translateY(-3px);
  background:rgba(255,255,255,.1);
  box-shadow:0 0 18px rgba(255,255,255,.12);
}

.links img{
  width:15px;
}

/* ===== SERVER CARD ===== */

.server{
  display:flex;
  align-items:center;
  justify-content:space-between;

  gap:14px;

  padding:16px;

  border-radius:22px;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.05);
}

.server-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.server img{
  width:48px;
  height:48px;
  border-radius:14px;
  object-fit:cover;

  border:1px solid rgba(255,255,255,.08);
}

.server-title{
  font-weight:600;
  font-size:15px;
}

.server-sub{
  opacity:.6;
  font-size:12px;
  margin-top:2px;
}

/* ===== JOIN BUTTON ===== */

.join{
  position:relative;

  text-decoration:none;
  color:white;

  font-size:13px;
  font-weight:600;

  padding:12px 18px;

  border-radius:16px;

  overflow:hidden;

  background:linear-gradient(135deg,#7c3aed,#2563eb);

  transition:.35s;

  box-shadow:
  0 0 25px rgba(99,102,241,.35);
}

.join::before{
  content:'';
  position:absolute;
  top:0;
  left:-120%;
  width:100%;
  height:100%;

  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.4),
    transparent
  );

  transition:.6s;
}

.join:hover::before{
  left:120%;
}

.join:hover{
  transform:translateY(-3px) scale(1.03);

  box-shadow:
  0 0 35px rgba(99,102,241,.6);
}

/* ===== GLOW ===== */

.glow{
  position:fixed;
  width:320px;
  height:320px;

  border-radius:50%;

  background:
  radial-gradient(circle,
  rgba(124,58,237,.22),
  transparent 70%);

  pointer-events:none;

  filter:blur(35px);

  z-index:0;
}

/* ===== PARTICLES ===== */

canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:2;
}

/* ===== MOBILE ===== */

@media(max-width:500px){

  .container{
    width:94%;
    padding:14px;
  }

  .card{
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .links{
    justify-content:center;
  }

  .server{
    flex-direction:column;
    align-items:flex-start;
  }

  .join{
    width:100%;
    text-align:center;
  }

}

</style>
</head>
<body>

<!-- ENTER SCREEN -->

<div id="overlay">
  <h1>ANSHHH</h1>
  <p>TAP TO ENTER</p>
</div>

<!-- BACKGROUND VIDEO -->

<video id="bg" autoplay muted loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="bg-overlay"></div>

<!-- MAIN -->

<div class="container" id="wrap">

  <!-- PROFILE -->

  <div class="card">

    <img src="profile.jpeg" class="avatar">

    <div>

      <div class="title">Anshh</div>

      <div class="sub">
        Developer • Event Manager
      </div>

      <div class="loc">
        📍 Bhilai, India
      </div>

      <div class="links">

        <a href="https://www.instagram.com/anshhhyrrrr?igsh=dmg1ZzZtMWxkeGow" target="_blank">
          <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
          Instagram
        </a>

        <a href="https://github.com/shreyy-gims" target="_blank">
          <img src="https://cdn-icons-png.flaticon.com/512/733/733553.png">
          GitHub
        </a>

        <a href="https://open.spotify.com/user/317fetkkltqoeycuqqxt5tlsx4wu?si=BksPV-J8QECOL4-LcfS-WQ" target="_blank">
          <img src="https://cdn-icons-png.flaticon.com/512/174/174872.png">
          Spotify
        </a>

      </div>

    </div>

  </div>

  <!-- SERVER -->

  <div class="server">

    <div class="server-left">

      <img src="server.png">

      <div>
        <div class="server-title">
          AfterDark Society
        </div>

        <div class="server-sub">
          Private Community
        </div>
      </div>

    </div>

    <a class="join" href="https://discord.gg/xFxQqzUY" target="_blank">
      JOIN
    </a>

  </div>

</div>

<!-- GLOW -->

<div class="glow" id="glow"></div>

<!-- PARTICLES -->

<canvas id="c"></canvas>

<script>

/* ===== ENTER ===== */

const overlay = document.getElementById('overlay');

overlay.onclick = () => {

  gsap.to('#overlay',{
    opacity:0,
    duration:.7,
    onComplete:()=>{
      overlay.style.display='none';
    }
  });

  gsap.from('.container',{
    opacity:0,
    y:40,
    duration:1.2,
    ease:'power3.out'
  });

};

/* ===== GLOW FOLLOW ===== */

const glow = document.getElementById('glow');

window.addEventListener('mousemove',e=>{
  glow.style.left = e.clientX - 160 + 'px';
  glow.style.top = e.clientY - 160 + 'px';
});

window.addEventListener('touchmove',e=>{
  let t = e.touches[0];

  glow.style.left = t.clientX - 160 + 'px';
  glow.style.top = t.clientY - 160 + 'px';
});

/* ===== PARTICLES ===== */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}

resize();

window.addEventListener('resize',resize);

let particles = [];

window.addEventListener('mousemove',e=>{

  particles.push({
    x:e.clientX,
    y:e.clientY,
    life:35
  });

});

function animate(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,i)=>{

    ctx.fillStyle=`rgba(255,255,255,${p.life/35})`;

    ctx.beginPath();
    ctx.arc(p.x,p.y,1.6,0,Math.PI*2);
    ctx.fill();

    p.life--;

    if(p.life<=0){
      particles.splice(i,1);
    }

  });

  requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Afterdark Society</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Inter;overflow:hidden}

#overlay{
 position:fixed;inset:0;
 display:flex;flex-direction:column;
 align-items:center;justify-content:center;
 background:#000;z-index:10;
 font-family:Orbitron;
}

#overlay h1{font-size:22px;letter-spacing:2px}
#overlay p{opacity:.6;font-size:12px}

video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.5)}

.container{
 position:absolute;
 top:50%;left:50%;
 transform:translate(-50%,-50%);
 width:92%;max-width:380px;
 padding:18px;
 border-radius:22px;
 backdrop-filter:blur(30px);
 background:rgba(20,20,25,.35);
 border:1px solid rgba(255,255,255,.08);
 box-shadow:0 20px 80px rgba(0,0,0,.6);
}

.card,.server{
 display:flex;gap:12px;
 padding:12px;border-radius:14px;
 background:rgba(255,255,255,.04);
 border:1px solid rgba(255,255,255,.08);
 margin-bottom:10px;
}

.avatar{width:55px;height:55px;border-radius:50%}
.server img{width:36px;border-radius:8px}

.title{font-family:Orbitron;font-size:16px}
.sub{opacity:.6;font-size:12px}
.loc{opacity:.5;font-size:11px}

.join{
 margin-top:5px;
 padding:5px 12px;
 border-radius:12px;
 background:#22c55e;
 color:#fff;text-decoration:none;
 font-size:12px;
}

.links{display:flex;gap:10px;margin-top:6px}
.links a{display:flex;align-items:center;gap:5px;font-size:12px;color:#fff;text-decoration:none}
.links img{width:16px}

/* glow */
.glow{
 position:fixed;
 width:300px;height:300px;
 background:radial-gradient(circle,rgba(255,0,100,.2),transparent);
 pointer-events:none;
 mix-blend-mode:screen;
}

canvas{position:fixed;inset:0;pointer-events:none}
</style>
</head>
<body>

<div id="overlay">
 <h1>AFTERDARK</h1>
 <p>tap to enter</p>
</div>

<video id="bg" loop muted playsinline>
 <source src="video.mp4" type="video/mp4">
</video>

<audio id="music" loop>
 <source src="song.mp3" type="audio/mp3">
</audio>

<div class="container" id="wrap">

<div class="card">
 <img src="profile.jpg" class="avatar">
 <div>
  <div class="title">Anshh</div>
  <div class="sub">Developer , Event Manager</div>
  <div class="loc">📍 Bhilai</div>
  <div class="links">
   <a href="https://www.instagram.com/anshhhyrrrr?igsh=dmg1ZzZtMWxkeGow"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">Insta</a>
   <a href="https://github.com/shreyy-gims"><img src="https://cdn-icons-png.flaticon.com/512/733/733553.png">GitHub</a>
  </div>
 </div>
</div>

<div class="server">
 <img src="server.png">
 <div>
  <div>afterdark society</div>
  <div class="sub">Private server</div>
 </div>
 <a class="join" href="https://discord.gg/xFxQqzUY">Join</a>
</div>

</div>

<div class="glow" id="glow"></div>
<canvas id="c"></canvas>

<script>
const overlay=document.getElementById('overlay');
const music=document.getElementById('music');
const video=document.getElementById('bg');
const glow=document.getElementById('glow');

overlay.onclick=()=>{
 overlay.style.display='none';
 video.play();
 music.volume=0.6;
 music.play();
 gsap.from('.container',{opacity:0,y:40,duration:1});
}

// glow follow
addEventListener('mousemove',e=>{
 glow.style.left=e.clientX-150+'px';
 glow.style.top=e.clientY-150+'px';
});
addEventListener('touchmove',e=>{
 let t=e.touches[0];
 glow.style.left=t.clientX-150+'px';
 glow.style.top=t.clientY-150+'px';
});

// particles
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=innerWidth;canvas.height=innerHeight;
let pts=[];
addEventListener('mousemove',e=>{
 pts.push({x:e.clientX,y:e.clientY,l:40});
});
(function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 pts.forEach((p,i)=>{
  ctx.fillStyle=`rgba(255,255,255,${p.l/40})`;
  ctx.fillRect(p.x,p.y,2,2);
  p.l--;
  if(p.l<=0) pts.splice(i,1);
 });
 requestAnimationFrame(draw);
})();
</script>

</body>
</html>
